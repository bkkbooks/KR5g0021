忌第十三凡醮食可以飯賢人道士不得與雜俗昏穢之人孝子婦人尤忌亦不道餉遺俗流之𩔖舊法皆送於長流水中及土地埋之勿飲酒其氣亂勿食五辛其氣昏勿與别人同坐其氣雜勿視死看生其氣穢勿嗔怒其氣奔勿悲哀其神傷勿見血其氣污巳上七戒宜依七日或二七日不違之能滿四十九日更佳大都道人忌之悉然非止醮後夫求市醮物皆須時新豐潔無蚛孔及塵穢之物又不得論其財鏹其入土沉穢之物不充醮物蔗芋暑藥藕葛之徒若以人參伏苓之類不禁此皆靈物所育營辦之時先沐浴清淨燒香洗滌器物刀机不得髙言厲語嗔怒小大交遊外俗如不解自營須求造食人先約勒令沐浴換新衣專自看之醮三洞眞文五法正一盟威籙立成儀
