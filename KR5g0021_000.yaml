front:
  text: 醮三洞真文五法正一盟威籙立成儀逐九
  hash: sha256:6ff76853e42b3738c301cbe3103b196c822c2fd9280492f4c8571cbfeceab53e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0021_HFL_000-001a, image: hfl/0878/0878-158.png}
body:
  text: 三洞弟子張萬福撰凡醮者所以薦誠於天地祈福於𡨋靈若不精專則不足以通感盡誠而福不應者未之有也誠不極而望臻者亦未聞矣修佩之者宜竭誠焉凡設座得名山洞穴是佳不然即幽間虛寂亦可施置其器物座具時果芳饌必在豐新山洞間無席即藉草以木葉若淨為中預愼內外不得犬鼠畜産雜穢葷肥登臨犯觸及呵叱大小盛饌一如齊法世人心昧不覩精微即云酒脯但生不信且道法清虛特忌殗穢星辰嶽瀆皆是真仙主之不究根尋源直信邪說若斯之類吁可痛哉知上士之所勤下愚之大笑也設壇座位第一潔壇解穢第二入戶呪第三發爐第四出靈官第五請官啓事第六送神真第七勑小吏神第八內官第九復爐第十送神頌第十一出戶呪第十二醮後諸忌第十三設壇座位第一夫神道非形至誠斯感真靈無象啓必有方修之者須立壇位以祈福應也其壇請依靈寶招真法開東西南北王上五門方二丈四尺欄纂如法何者三洞經法洞玄居中故用其事以通上下也立壇訖置上清位於壇中稍近前南向施青絳紋巾以法籙開安座上前設五尺盤三枚一盤九分一盤六分三盞燈一盤一分都合十六分十六杯三爐香次北近西六甲位南向敷絳巾以符開安座前設六盤每盤一分一爐香六杯燈一次東頭三皇位南向敷碧巾以符開安座上從東天皇次地皇次人皇前設三盤盤一分三香三杯三燈次東面北頭五嶽真形圖西向敷絳巾以圖符安座上前三盤近北一盤五分五嶽君位近南一盤二分佐命君位次南向二盤各一分青城廬山使者位三盤九分九杯四燈四爐香也次南五符位西向敷中以符安座上前三盤一盤一分稍前或别席敷皂巾人鳥山位一盤一杯一香一燈次後二盤真文五符八景內音位各五分合十分十杯一香一燈次南設盟威位東向敷絳巾符安座上前設三盤盤八分合二十四分二十四杯或十二杯或八或三各有法象一香一爐次北設東西二禁位東向敷青巾以符安座上前設三盤近北一盤一分西嶽君位次近南中黃太一位一盤一分次近西四神君位一盤四分都三盤合十六分或六盤三分二香二燈若修七星即於壇中上清後六甲前南向敷紫巾設七盤盤一分七杯一香一燈此位縱不修亦宜設位夫醮法以斯為首也河圖附上清亦可於上清後三皇前敷青巾南向設一盤九分一香九杯一燈醮餘鎮信鹽豉米等於上清前小近東一席置之項見師作如是設位非敢自專其所須香燈鎮信並須如法或能每座設案更以淨巾以籙於案上更佳各設版壇四面並須絳繩欄之不然即灰或麥麩圍之欲使真靈有位想念可以淨幕遮圍不使香燈散亂尤佳也潔壇解穢第二夫所以潔壇者蕩滌故氣芳澤真靈使內外清通人神俱感凡啓醮悉皆如之非直此也向王書解穢符於紙上其水桃皮竹葉沉香雞舌香柏葉等銼絹袋沉湯中煮之以灑壇及器物中并沐浴或以清泉新水亦得用也依前章鋪訖具法服以劒水於地戶上先劒後水相去各三步啓奏作三才步步畢握固瞑目存經籍度師在西面存唐將軍兵馬佩劒執印在左葛將軍兵馬執㦸佩劒在右周將軍兵馬執節在前真人著朱衣乘九鳯步斗臨壇收穢七星覆已頭上柄指前不得遮己目畢開目誦四靈呪呪曰東方青龍角亢之精云常云並依畢以手撫心丁字立呪曰吾召百神既集即當遊云云次三才步次勑水江河淮海非凡水云云乃噀水一下唱攝三下次稱名位訖謹請東方青龍降以真氣入臣身中云云次作三才步九跡或既濟卦次請五童君云云其他並常也次作七星剛步放水枕訖入戶祝第三四上功曹龍虎使者正一生氣侍靜素女夜有所啓請得開明童子上玄少女與我俱入黃宮之裏通達所啓皆使上聞畢便入繞壇一周啓事人西北設位而立餘衆官男設位向東先上諸座香次上啓告香也次唱各禮師存念如法次存三師如常發爐第四鳴法鼓三十六通無上三天玄元始三氣太上老君召出臣某身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童散花玉女五帝直符直日香官各三十六人出關啓州縣土地里域真官正神臣某今正爾燒香設醮願得十方正真生氣降流臣等身中令所啓速達徑御三清玉帝至真几前次上奏按香衆官再拜出靈官第五長跪叩齒二十四通謹出臣某身中五體真官上仙上靈直使功曹正一功曹左右官使者隂陽神決吏科車赤符吏剛風騎置驛馬上章吏官各二人出臣某身中虛元自然左右侍郎混沌玉帝太真左右領仙玉郎九玄上虛功曹三元功曹各二十四人出上清玉虛使者神仙使者太山使者金晨玉童太華玉女左右靈飛玉虛侍郎各二十四人出五帝元皇太真各九千人出檢天輔仙騎輔真騎輔神騎輔帝騎輔靈騎各九億萬衆出五帝飛輪䇿空騎五帝飛仙騰空騎各九億萬衆出九天飛瓊羽蓋騎飛轅緑駢騎制地龍騰騎各九億萬衆出自然招真生芝玉仙吏招神生芝玉仙吏神丹生芝玉仙吏各九億萬衆出金真輝電騎陽精興雲降雨騎隂精興雲降雨騎陽明照曜逐電騎雲門執節金光騎各九億萬衆出臣某身中靈寶洞玄三部八景諸天內音神仙繡衣玉女五帝直符傳言奏事日月星宿五帝官屬神龍騎飛龍騎驛龍騎雲龍騎乘等一合嚴裝冠帶整其威儀對立臣某前告勑上下八方天官地官水官五嶽四瀆九江八極名山大澤五帝真官四司監察九部考召玄元四始甲子諸官君無極無窮無髙無下無幽無明無深無淺無鞅數衆真官注氣乾皇九宫八卦六甲直符虛無直事五嶽飛仙神龍羽騎等並為關啓奏聞臣某去某年某月某日詣上清大洞法師某君門下奉受仙靈畢法上清仙籙靈寶真文八景五法六甲祕符西嶽名山五嶽真仙圖籙三皇五帝神符九天鳯氣正法真籙金神虎符豁落七元靈飛六甲紫文交帶回車畢道佩服身形存修供養吉辰於某觀靈壇之上旋設薄醮陳情獻欵以契真靈三界官屬與臣某身中五體三萬六千神吏分形合影營護壇所馘滅妖氛咸令肅穆無使參差聽臣某關奏啓請必蒙降赴請官啓事第六從此巳後並須平聲低言讀之每至再拜皆住良久不得髙厲也上清玄都大洞三景弟子某嶽先生某帝小兆真人臣某再拜請官謹奉請上皇二十四髙真玉清紫虛髙上元皇道君等各神仙玉童玉女一合乘雲馭氣應景分靈垂光降臨醮席再拜謹奉請三天正法三元大君太微靈都元皇真君神仙丈人玉童玉女六十三部靈官真人一合分靈應景馭氣乘雲騰空遍下垂光降臨醮席再拜謹奉請太清髙仙景雲真人太上丈人上皇君九華太帝玄黃玉女一合流精散氣逐感隨機駕景通神乘光降席再拜謹奉請瓊宫左右靈飛真童玉女神仙等衆垂光降席再拜謹奉請河圖太尉玉帝府九晨君真皇夫人諸靈官使者玉童玉女等一合馭景分暉垂光降席再拜謹奉請太平下教二十四髙真人一合留神應感布大慈悲念彼有心同塵接世分暉列照垂光降席再拜謹奉請北斗七星真君輔弼真宰仙靈騎從一合馭景分暉垂光降席再拜謹奉請六甲所領六旬真神六丁玉女符吏從官直日直符十二守士並臨降醮席再拜謹奉請西嶽君及飛天丈人太一中黃玄上玉童虎王李君猛獸先生一合來下降臨醮席再拜謹奉請五嶽君佐命濳霍儲君青城丈人廬山使者及當境山川真靈並降臨醮席再拜謹奉請天皇天一君地皇太一君人皇玄一君真靈騎從並降臨醮席再拜謹奉請人鳥山形真靈騎從一合來下降臨醮席再拜謹奉請東方靈威仰蒼帝君青牙九氣天君太上真王青腰玉女東鄉諸靈官並臨醮席再拜謹奉請南方赤熛弩赤帝君朱丹三氣天君元氣丈人朱宫太丹玉女南鄉諸靈官並臨醮席再拜謹奉請中央舍樞紐黃帝君太帝真人子丹黃庭戊己天蒼玉女中央太帝靈官並臨醮席再拜謹奉請西方曜伯寶白帝君明石七氣天君元氣丈人太上白素玉女西鄉諸靈官並臨醮席再拜謹奉請北方隱侯局黑帝君玄滋五氣天君太上靈君夜光玉女北鄉諸靈官並臨醮席再拜謹奉請夏帝君五嶽靈山真人江河四瀆三官九府諸靈官地仙玉女五嶽飛仙諸仙官並臨醮席再拜謹奉請斗宫諸真人玉童玉女髙仙神官服紫翠十華之帔雲錦鳯羅之裙右佩虎章左帶龍劒御碧林之輦乘三素之雲垂光回眄曲賜下臨再拜謹奉請左上仙蔽身大將軍一人姓唐名宏字文明赤幘朱衣大冠左手執節右手持符佩劒兵士三千萬衆下臨醮席再拜謹奉請右上靈隱形大將軍一人姓葛名雍字文度赤幘朱衣大冠左手執㦸右手持符佩劒兵士三千萬衆下臨醮席再拜謹奉請中上神藏影大將軍一人姓周名武字文剛赤幘朱衣大冠左手執節右手持符佩劒兵士三千萬衆下臨醮席再拜謹奉請臣身中所佩太上正一童子一將軍籙籙中正一功曹使者仙童侍從降臨醮席謹奉請臣身中所佩太上正一童子十將軍籙籙中功曹使者郎吏虎賁等降臨醮席謹奉請臣身中所佩太上正一上仙上靈百五十將軍籙籙中功曹使者將軍吏兵降臨醮席謹奉請臣身中所佩太上赤天三部唐將軍葛將軍周將軍并侍從兵吏各三千萬衆嚴裝盛服降臨醮席謹奉請臣身中所佩太上上靈百鬼召籙籙中功曹使者將軍吏兵降臨醮席謹奉請臣身中所佩太上元命混沌赤籙籙中功曹使者仙人玉女將軍吏兵降臨醮席謹奉請臣身中所佩太上三五上仙百鬼召籙籙中將軍吏兵降臨醮席謹奉請臣身中所佩太上九州社令籙籙中功曹使者將軍吏兵降臨醮席再拜謹奉請臣身中所佩太上三五星剛五斗籙籙中功曹使者魁罡斗步將軍吏兵降臨醮席謹奉請臣身中所佩太上河圖寶籙籙中功曹使者仙童玉女降臨醮席謹奉請臣身中所佩太上解六害神符籙籙中真官解刑却害將軍吏兵等降臨醮席謹奉請臣身中所佩太上九鳯破穢籙籙中五方破穢將軍吏兵降臨醮席謹奉請臣身中所佩大上都章畢印籙籙中真神功曹使者仙童玉女降臨醮席謹奉請臣身中所佩太上斬邪華蓋籙籙中功曹使者將軍吏兵降臨醮席謹奉請臣身中所佩太上九天兵符籙籙中統領九天神君將軍吏兵降臨醮席謹奉請臣身中所佩太上九宫捍厄籙籙中諸官却厄君將軍吏兵降臨醮席再拜謹奉請臣身中所佩太上八卦謹身籙籙中功曹八方護身君將軍吏兵降臨醮席謹奉請臣身中所佩太上考召籙籙中考召君將吏攝召靈官降臨醮席謹奉請臣身中所佩太上斬邪赤籙籙中辟斥將軍吏兵斬邪靈官降臨醮席謹奉請臣身中所佩太上辟邪神籙籙中功曹使者將軍吏兵降臨醮席謹奉請臣身中所佩太上四都禁氣籙籙中禁氣將軍功曹吏兵降臨醮席謹奉請臣身中所佩太上大斬邪籙籙中誅邪斷絶水府精邪將軍吏兵降臨醮席謹奉請臣身中所佩太上功曹籙籙中功曹使者仙童玉女吏兵降臨醮席謹奉請臣身中所佩太上保命長生籙籙中保命君吏降臨醮席再拜謹奉請太上三元大將軍劵契中貴神將吏降臨醮席再拜謹奉請陽平治都功治籙若不受都功不請也言治典二十四治治有二十四人官有二十四職職有二百四十軍軍有二千四百將將有二萬四千吏吏有二十四萬兵男官女官二十四官男職女職二十四職男氣女氣二十四氣治中虎賁威儀鈴下五百將各二十四人治中校尉百二十人治中功曹二人治中主簿二人治中幹佐十二人治中金剛童子十二人治中小吏十二人治中部章督郵十二人治中從事十二人治中使者十二人治中通章二人治中典治君十二人治中考召吏二十四人治中左右隂陽二十四生氣吏治中建節監功大將軍二十